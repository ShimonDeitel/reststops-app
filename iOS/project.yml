name: reststops
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  reststops:
    type: application
    platform: iOS
    sources: [reststops]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.reststops
        INFOPLIST_FILE: reststops/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: reststops/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Roadside Rest Stops
  reststopsTests:
    type: bundle.unit-test
    platform: iOS
    sources: [reststopsTests]
    dependencies:
      - target: reststops
  reststopsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [reststopsUITests]
    dependencies:
      - target: reststops
schemes:
  reststops:
    build:
      targets:
        reststops: all
    test:
      targets:
        - reststopsTests
        - reststopsUITests
